<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding and viewport -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />

    <!-- Mobile app meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TradeHax" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme colors for browsers and mobile -->
    <meta name="theme-color" content="#090B10" />
    <meta name="msapplication-TileColor" content="#090B10" />
    <meta name="msapplication-TileImage" content="/apple-touch-icon.png" />

    <!-- SEO and description -->
    <meta name="description" content="TradeHax Neural Hub - Elite AI trading assistant with live market data, real-time signals, and hallucination-free analysis" />
    <meta name="keywords" content="AI trading, neural network, market analysis, signals, crypto, stocks, machine learning" />
    <meta name="author" content="TradeHax" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Open Graph for social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TradeHax Neural Hub - AI Trading Assistant" />
    <meta property="og:description" content="Elite AI trading assistant with real-time market data and predictive signals" />
    <meta property="og:url" content="https://tradehax.net" />
    <meta property="og:site_name" content="TradeHax" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TradeHax Neural Hub" />
    <meta name="twitter:description" content="Elite AI trading assistant with real-time market data and predictive signals" />

    <!-- DNS Prefetch and Preconnect for performance -->
    <link rel="preconnect" href="https://api.coingecko.com" crossorigin />
    <link rel="preconnect" href="https://api-inference.huggingface.co" crossorigin />
    <link rel="preconnect" href="https://api.openai.com" crossorigin />
    <link rel="preconnect" href="https://api.binance.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Responsive CSS -->
    <link rel="stylesheet" href="/src/styles/responsive.css" />

    <!-- Favicon and app icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>TradeHax Neural Hub - AI Trading Assistant</title>
  </head>
  <body>
    <div id="root">
      <main
        style="min-height: 100vh; background: #090B10; color: #C8D8E8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; padding: 24px; display: flex; align-items: center; justify-content: center;"
      >
        <section style="max-width: 600px; text-align: center;">
          <div style="color: #F5A623; font-size: 11px; letter-spacing: 0.15em; margin-bottom: 16px; font-weight: 600;">
            TRADEHAX.NET
          </div>
          <h1 style="margin: 0 0 16px 0; font-size: 32px; font-weight: 700;">Neural Hub Loading...</h1>
          <p style="color: #8EA2B8; line-height: 1.7; font-size: 14px;">
            Initializing AI trading assistant with live market data integration.
          </p>
          <div style="margin-top: 24px; display: inline-block;">
            <div style="width: 40px; height: 40px; border: 3px solid #1C2333; border-top-color: #00D9FF; border-radius: 50%; animation: spin 1s linear infinite;"></div>
          </div>
        </section>
      </main>
    </div>
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

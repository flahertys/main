version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradehax-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://tradehax:tradehax@postgres:5432/tradehax
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - /app/node_modules
    networks:
      - tradehax
    restart: unless-stopped

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: tradehax-postgres
    environment:
      POSTGRES_USER: tradehax
      POSTGRES_PASSWORD: tradehax
      POSTGRES_DB: tradehax
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradehax -d tradehax"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradehax
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: tradehax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradehax
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tradehax:
    driver: bridge

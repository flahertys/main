name: Deploy to Namecheap VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAMECHEAP_VPS_HOST: ${{ secrets.NAMECHEAP_VPS_HOST }}
      NAMECHEAP_VPS_USER: ${{ secrets.NAMECHEAP_VPS_USER }}
      NAMECHEAP_VPS_SSH_KEY: ${{ secrets.NAMECHEAP_VPS_SSH_KEY }}
      NAMECHEAP_VPS_PORT: ${{ secrets.NAMECHEAP_VPS_PORT }}
      NAMECHEAP_APP_ROOT: ${{ secrets.NAMECHEAP_APP_ROOT }}
      NAMECHEAP_APP_PORT: ${{ secrets.NAMECHEAP_APP_PORT }}
      PUBLIC_HEALTH_URL: ${{ secrets.TRADEHAX_PUBLIC_HEALTH_URL }}
      PUBLIC_BASE_URL: ${{ secrets.TRADEHAX_PUBLIC_BASE_URL }}

    steps:
      - name: Precheck required secrets
        id: precheck
        shell: bash
        run: |
          if [[ -n "${NAMECHEAP_VPS_HOST}" && -n "${NAMECHEAP_VPS_USER}" && -n "${NAMECHEAP_VPS_SSH_KEY}" ]]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.precheck.outputs.can_deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.precheck.outputs.can_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        if: steps.precheck.outputs.can_deploy == 'true'
        run: npm ci

      - name: Quality checks
        if: steps.precheck.outputs.can_deploy == 'true'
        run: npm run lint && npm run type-check

      - name: Build
        if: steps.precheck.outputs.can_deploy == 'true'
        run: npm run build

      - name: Prepare release metadata
        if: steps.precheck.outputs.can_deploy == 'true'
        id: meta
        run: |
          echo "release_id=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT
          if [[ -n "${NAMECHEAP_APP_ROOT}" ]]; then
            echo "app_root=${NAMECHEAP_APP_ROOT}" >> $GITHUB_OUTPUT
          else
            echo "app_root=/home/${NAMECHEAP_VPS_USER}/tradehax" >> $GITHUB_OUTPUT
          fi
          if [[ -n "${NAMECHEAP_APP_PORT}" ]]; then
            echo "app_port=${NAMECHEAP_APP_PORT}" >> $GITHUB_OUTPUT
          else
            echo "app_port=3000" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH key
        if: steps.precheck.outputs.can_deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          KEY_CONTENT="$(printf '%b' "${NAMECHEAP_VPS_SSH_KEY}")"
          if printf '%s' "$KEY_CONTENT" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
          else
            printf '%s' "$KEY_CONTENT" | tr -d '\r\n' | base64 -d > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          PORT="${NAMECHEAP_VPS_PORT:-21098}"
          ssh-keyscan -T 10 -p "$PORT" -H "${NAMECHEAP_VPS_HOST}" >> ~/.ssh/known_hosts || true
          echo "SSH bootstrap complete (known_hosts best-effort)."

      - name: Sync release to server
        if: steps.precheck.outputs.can_deploy == 'true'
        run: |
          APP_ROOT="${{ steps.meta.outputs.app_root }}"
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          REMOTE="${NAMECHEAP_VPS_USER}@${NAMECHEAP_VPS_HOST}"
          PORT="${NAMECHEAP_VPS_PORT:-21098}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          ssh $SSH_OPTS -p "$PORT" "$REMOTE" "mkdir -p $APP_ROOT/releases/$RELEASE_ID"

          rsync -az --delete \
            --exclude .git \
            --exclude node_modules \
            --exclude .next \
            -e "ssh $SSH_OPTS -p $PORT" \
            ./ "$REMOTE:$APP_ROOT/releases/$RELEASE_ID/"

      - name: Run remote deploy script
        if: steps.precheck.outputs.can_deploy == 'true'
        run: |
          APP_ROOT="${{ steps.meta.outputs.app_root }}"
          APP_PORT="${{ steps.meta.outputs.app_port }}"
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          REMOTE="${NAMECHEAP_VPS_USER}@${NAMECHEAP_VPS_HOST}"
          PORT="${NAMECHEAP_VPS_PORT:-21098}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          ssh $SSH_OPTS -p "$PORT" "$REMOTE" \
            "chmod +x $APP_ROOT/releases/$RELEASE_ID/deploy/namecheap/deploy-remote.sh && \
             APP_ROOT=$APP_ROOT APP_PORT=$APP_PORT RELEASE_ID=$RELEASE_ID RELEASE_SOURCE=$APP_ROOT/releases/$RELEASE_ID \
             bash $APP_ROOT/releases/$RELEASE_ID/deploy/namecheap/deploy-remote.sh"

      - name: Deployment summary
        if: steps.precheck.outputs.can_deploy == 'true'
        run: |
          echo "✅ Deployed release ${{ steps.meta.outputs.release_id }} to Namecheap VPS"

      - name: Verify production endpoint
        if: steps.precheck.outputs.can_deploy == 'true'
        shell: bash
        run: |
          HEALTH_URL="${PUBLIC_HEALTH_URL:-https://tradehax.net/api/health}"
          BASE_URL="${PUBLIC_BASE_URL:-https://tradehax.net}"

          echo "Checking health endpoint: $HEALTH_URL"
          for attempt in {1..30}; do
            BODY="$(curl -fsS "$HEALTH_URL" || true)"
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ Health endpoint returned status ok"
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              echo "❌ Health endpoint verification failed after retries"
              echo "Last health response: $BODY"
              exit 1
            fi
            sleep 2
          done

          echo "Checking public homepage content: $BASE_URL"
          HOMEPAGE="$(curl -fsS "$BASE_URL" || true)"
          if echo "$HOMEPAGE" | grep -qi "TradeHax Final Merge"; then
            echo "❌ Detected legacy fallback page marker: TradeHax Final Merge"
            exit 1
          fi

          if ! echo "$HOMEPAGE" | grep -qi "TRADEHAX"; then
            echo "❌ Expected TradeHax branding marker not found on homepage"
            exit 1
          fi

          echo "✅ Public homepage verification passed"

      - name: Missing secrets summary
        if: steps.precheck.outputs.can_deploy != 'true'
        run: |
          echo "Namecheap VPS deploy skipped: required secrets are missing."
          echo "Set NAMECHEAP_VPS_HOST, NAMECHEAP_VPS_USER, NAMECHEAP_VPS_SSH_KEY to enable automation."

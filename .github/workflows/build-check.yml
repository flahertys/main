name: Build & Deployment Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Validate internal links (changed scope)
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run check:links:changed

      - name: Validate internal links (full scan)
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run check:links:report

      - name: Run CI pipeline contract
        env:
          SKIP_PRECHECK_LINKS: "true"
        run: npm run pipeline:ci

      - name: Upload link audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-audit-report
          path: |
            .artifacts/link-audit-report.json
            .artifacts/link-audit.sarif

      - name: Upload link audit SARIF
        if: ${{ always() && github.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .artifacts/link-audit.sarif
          category: link-audit

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .next/**
